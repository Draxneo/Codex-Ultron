services:
  - type: web
    name: ultraoffice-2
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: NODE_VERSION
        value: 24.14.0
      - key: VITE_SUPABASE_URL
        value: https://tqkqqjvddfrcxrxfvzvz.supabase.co
      - key: VITE_SUPABASE_PROJECT_ID
        value: tqkqqjvddfrcxrxfvzvz
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: VITE_GOOGLE_MAPS_API_KEY
        sync: false
    headers:
      - path: /ivr-greetings/**/*.mp3
        name: Content-Type
        value: audio/mpeg
      - path: /ivr-greetings/**/*.wav
        name: Content-Type
        value: audio/wav
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
