name: Client release builds

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  web-quality:
    name: Web build and checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build web app
        run: npm run build

      - name: Trigger Render deploy
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' }}
        run: curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

  electron-windows:
    name: Electron Windows package
    runs-on: windows-latest
    needs: web-quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package Electron
        run: npm run electron:pack
        env:
          ELECTRON_PLATFORM: win32
          ELECTRON_ARCH: x64

      - name: Upload Electron package
        uses: actions/upload-artifact@v4
        with:
          name: ultraoffice-electron-windows
          path: electron-release/**
          if-no-files-found: error

  capacitor-android:
    name: Capacitor Android debug APK
    runs-on: ubuntu-latest
    needs: web-quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Build Android debug APK
        run: npm run cap:android:debug

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: ultraoffice-android-debug
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
